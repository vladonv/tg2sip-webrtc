name: Build and publish .deb packages

# Builds + lints + publishes a GitHub Release with .deb packages for both
# Debian 12 (bookworm) and 13 (trixie).
#
# Unlike monast (pure Python/PHP, Architecture: all, one shared build for
# any Debian release), tg2sip-webrtc is compiled C++ against system
# libraries (FFmpeg, opus, ...) whose SONAMEs/versions differ between
# bookworm and trixie - dh_shlibdeps needs to run inside the actual target
# release to compute correct ${shlibs:Depends}, so this builds via a
# matrix of Debian's own container images rather than once on
# ubuntu-latest, then a second job aggregates both legs' artifacts into
# one release (avoids two matrix legs racing to `gh release create` the
# same tag).

on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - codename: bookworm
            debian_release: "12"
          - codename: trixie
            debian_release: "13"
    # See the "Read package version" step below for why this is safe to
    # read from an arbitrarily-chosen matrix leg.
    outputs:
      version: ${{ steps.version.outputs.version }}
    container:
      image: debian:${{ matrix.codename }}
    # The from-source PJSIP+TDLib+spdlog build (all three now rebuilt under
    # Clang+libc++, see debian/rules) plus ntgcalls' own prebuilt-WebRTC
    # fetch and tg2sip-webrtc's own compile took on the order of 45-60 min
    # total on a dedicated 6-core/10GB box (see project build notes) - not
    # separately timed on GitHub's smaller 2-core shared runners
    # (BUILD_JOBS below), so this leaves considerably more headroom than a
    # simple core-count scaling estimate would suggest, rather than
    # assuming the old 90-minute budget (set for the smaller pre-ntgcalls
    # build) still comfortably covers it.
    timeout-minutes: 150
    env:
      DEBIAN_FRONTEND: noninteractive
      # TDLib's compile units are memory-heavy per translation unit;
      # GitHub's standard runners (2 cores/7GB at the time of writing) are
      # smaller than the 6-core/8-10GB boxes this was tuned against, which
      # already needed BUILD_JOBS=4 instead of nproc to avoid an
      # OOM-killed linker - go lower still here. See debian/rules.
      BUILD_JOBS: "2"
    steps:
      # debian:* images ship without git. actions/checkout falls back to a
      # non-git GitHub-API tarball download when git is missing, which
      # leaves $GITHUB_WORKSPACE with no .git directory at all - breaking
      # every git command debian/rules' override_dh_auto_configure runs
      # later (git submodule update --init third_party/ntgcalls) with
      # "fatal: not a git repository", regardless of installing git
      # afterwards. git has to be present *before* checkout runs so
      # checkout does a real git clone instead.
      - name: Install git (needed before checkout, for real - see comment)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates

      - name: Check out repository
        uses: actions/checkout@v7

      - name: Work around containerized-checkout ownership check
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install remaining packaging tools
        run: apt-get install -y --no-install-recommends build-essential dpkg-dev devscripts lintian

      # Neither Debian release's own apt clang is good enough here: apt
      # clang 14 on bookworm hard-fails with real compile errors (not just
      # a warning) on ntgcalls' vendored Chromium libc++ headers; trixie's
      # apt clang happens to already be ~19 and does build, but relying on
      # "whatever this Debian release's own repo currently ships" is an
      # implicit, driftable dependency rather than a pinned one - and
      # Clang 19, while it builds clean, still prints libc++'s own
      # "Libc++ only supports Clang 20 and later" #warning on every
      # translation unit. apt.llvm.org offers the same Clang versions on
      # both bookworm and trixie (15 through 22 confirmed at the time of
      # writing), so pin an explicit version there for both matrix legs
      # instead. Clang 21 verified end-to-end on a from-scratch Debian 12
      # rebuild (full toolchain: TDLib/PJSIP/spdlog rebuilt under it, then
      # tg2sip-webrtc itself) - builds 100% clean, zero occurrences of that
      # warning anywhere in the log, unlike 19.
      #
      # Adds the apt.llvm.org source manually (signed-by= keyring, no
      # add-apt-repository) rather than using apt.llvm.org's own llvm.sh
      # installer script - llvm.sh hard-requires add-apt-repository
      # (from software-properties-common) as a prerequisite with no
      # fallback, and that package has been dropped from Debian 13
      # (trixie)'s own repos entirely (confirmed live: apt-cache
      # policy/search finds nothing for it at all, unlike literally any
      # other package) - a real, live CI failure on the trixie leg, not a
      # hypothetical. This manual form needs only wget + gnupg (both
      # already present/installed earlier in this job) and is verified
      # working identically on both bookworm and trixie.
      #
      # libclang-rt-21-dev explicitly listed, not left to --no-install-recommends:
      # it's only a Recommends of clang-21, not a hard Depends, so it silently
      # didn't get pulled in - a real, live failure on the bookworm leg's
      # first actual dpkg-buildpackage run, not a hypothetical. Without it,
      # ld can't find libclang_rt.ubsan_standalone.a when linking TDLib's own
      # test/run_all_tests (TDLib's CMakeLists.txt builds with
      # -fsanitize=undefined by default even in a Release configure, and
      # Ninja's generated "install" target depends on "all", so this gets
      # built regardless of only ever wanting `--target install`).
      - name: Install newer Clang (apt.llvm.org, both Debian releases' own apt clang is too old/unpinned)
        run: |
          apt-get install -y --no-install-recommends wget gnupg
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | gpg --dearmor -o /usr/share/keyrings/llvm-snapshot.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-snapshot.gpg] http://apt.llvm.org/${{ matrix.codename }}/ llvm-toolchain-${{ matrix.codename }}-21 main" > /etc/apt/sources.list.d/llvm.list
          apt-get update
          apt-get install -y --no-install-recommends clang-21 libc++-21-dev libc++abi-21-dev libclang-rt-21-dev

      - name: Install build dependencies (from debian/control)
        run: apt-get build-dep -y .

      # debian/rules' override_dh_auto_configure rebuilds PJSIP, TDLib and
      # spdlog from source into debian/build-deps on every single run
      # (~40 of this job's ~45-60 total minutes per the timeout-minutes
      # comment above) even though none of the three have changed since
      # the last build - pjproject/spdlog are pinned tags, and only TDLib
      # floats (cloned from `master`, no fixed commit - a separate
      # looseness, not fixed here). Cache the whole build-deps tree
      # (source checkouts + the shared DEPS_PREFIX install output) keyed
      # on everything that can change what ends up in it, including
      # TDLib's current upstream HEAD so the cache auto-invalidates
      # whenever TDLib actually moves instead of silently going stale.
      # debian/rules' own `test -d ... || git clone` guards already skip
      # re-cloning on a cache hit; make/ninja then see every object file's
      # mtime already up to date (tar-based cache restore preserves them)
      # and treat configure/build/install as no-ops beyond a few seconds
      # of bookkeeping - CLANG_VERSION/CMAKE_VERSION below must be kept in
      # sync with the same-named Make variables in debian/rules by hand,
      # there's no single source of truth shared between the YAML and the
      # Makefile.
      - name: Resolve TDLib HEAD for cache key
        id: tdlib_head
        run: echo "sha=$(git ls-remote https://github.com/tdlib/td.git refs/heads/master | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache PJSIP/TDLib/spdlog build
        uses: actions/cache@v6
        with:
          path: debian/build-deps
          key: build-deps-${{ matrix.codename }}-clang21-cmake4.3.3-pjproject2.9-spdlogv1.15.2-tdlib${{ steps.tdlib_head.outputs.sha }}

      - name: Read package version
        # Captured *before* the distro-suffix step below, so this is the
        # plain upstream version (e.g. "0.1.1") shared by every matrix leg -
        # used for the release tag. GitHub Actions picks an arbitrary leg's
        # value for a matrix job's outputs; fine here since this specific
        # value is identical across legs (unlike the actual built package
        # version, which differs per leg once suffixed).
        id: version
        run: echo "version=$(dpkg-parsechangelog -S Version)" >> "$GITHUB_OUTPUT"

      - name: Set a distro-specific package version
        # reprepro-style APT hosting (see vladonv/apt) keeps one shared pool
        # across every codename it serves, keyed by (package, version,
        # architecture) - two *different* builds (bookworm vs trixie, with
        # genuinely different linked library versions) sharing the exact
        # same Version: would collide there even though they're headed for
        # separate codenames. `dch -l` is the standard Debian mechanism for
        # exactly this ("give this build a distinguishing local version"),
        # producing e.g. 0.1.1~bookworm1 - note the suffix passed here has
        # no trailing digit: dch appends its own counter automatically, an
        # explicit "1" here would produce "~bookworm11", not "~bookworm1".
        env:
          DEBFULLNAME: Vlad Vorobyev
          DEBEMAIL: vlad.vorobev@gmail.com
        run: dch --local "~${{ matrix.codename }}" --distribution unstable --force-distribution "CI build for ${{ matrix.codename }}."

      - name: Build .deb packages
        # BUILD_JOBS is already in this step's environment (job-level env:
        # above) - debian/rules' `BUILD_JOBS ?= 4` picks it up automatically
        # since GNU Make imports the process environment as variables.
        run: dpkg-buildpackage -us -uc -b

      - name: Lint built package
        run: lintian ../tg2sip-webrtc_*.deb

      - name: Collect build artifacts
        # No manual filename disambiguation needed here (unlike an earlier
        # version of this workflow) - dpkg-buildpackage itself names the
        # output after the now distro-suffixed Version:, so bookworm's and
        # trixie's files are already distinct on their own.
        run: |
          mkdir -p dist
          cp ../tg2sip-webrtc_*.deb ../tg2sip-webrtc-dbgsym_*.deb ../tg2sip-webrtc_*.changes ../tg2sip-webrtc_*.buildinfo dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tg2sip-webrtc-${{ steps.version.outputs.version }}-${{ matrix.codename }}
          path: dist/*

  publish:
    needs: build
    # Manual workflow_dispatch runs build+lint+upload for testing without
    # publishing a release; only a real push to master does.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts from both Debian releases
        uses: actions/download-artifact@v7
        with:
          pattern: tg2sip-webrtc-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        # This job has no actions/checkout step (doesn't need the source,
        # only the already-built artifacts downloaded above) - so `gh`
        # can't infer the target repo from a local .git the usual way and
        # needs --repo spelled out explicitly, or every `gh release ...`
        # call fails with "failed to run git: fatal: not a git repository".
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="v${{ needs.build.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists, skipping (bump debian/changelog to publish a new one)."
          else
            gh release create "$tag" dist/* \
              --title "$tag" \
              --notes "Built from ${{ github.sha }} for Debian 12 (bookworm) and 13 (trixie). See debian/changelog for details."
          fi
